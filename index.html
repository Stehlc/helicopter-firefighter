<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helicopter Firefighter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #eee;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
  }
  #hud {
    font-size: 20px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  #board {
    font-size: 24px;
    line-height: 1.15;
    letter-spacing: 2px;
  }
  #message {
    font-size: 18px;
    margin-top: 12px;
    height: 24px;
    color: #ffa;
  }
</style>
</head>
<body>
<div id="hud"></div>
<pre id="board"></pre>
<div id="message"></div>
<script>
const W = 15, H = 15;
const WATER_ZONE = { x: 7, y: 14 };
const SPREAD_MS = 3000;
const FIRE_LIMIT = 3;

let state;
let spreadInterval = null;
let steamTimeout = null;

function init() {
  clearInterval(spreadInterval);
  clearTimeout(steamTimeout);
  spreadInterval = null;
  steamTimeout = null;
  state = {
    heli: { x: 7, y: 7 },
    hasWater: false,
    fires: new Set(),
    steam: null,       // { x, y } while steam is showing
    score: 0,
    started: false,
    gameOver: false
  };
  render();
  showMsg("Arrow key to start");
}

function key(x, y) { return x + "," + y; }

function render() {
  const { heli, hasWater, fires, steam, score } = state;
  const waterIcon = hasWater ? "\u{1F4A7}" : "\u274C";
  document.getElementById("hud").textContent =
    "Score: " + score + "  |  Water: " + waterIcon + "  |  Fires: \u{1F525}" + fires.size;

  let rows = [];
  for (let y = 0; y < H; y++) {
    let row = "";
    for (let x = 0; x < W; x++) {
      if (x === heli.x && y === heli.y) {
        row += "\u{1F681}";
      } else if (steam && x === steam.x && y === steam.y) {
        row += "\u{1F4A8}";
      } else if (fires.has(key(x, y))) {
        row += "\u{1F525}";
      } else if (x === WATER_ZONE.x && y === WATER_ZONE.y) {
        row += "\u{1F4A7}";
      } else {
        row += "\u2B1B";
      }
    }
    rows.push(row);
  }
  document.getElementById("board").textContent = rows.join("\n");
}

function showMsg(txt) {
  document.getElementById("message").textContent = txt;
}

function spawnFire() {
  if (state.gameOver) return;
  let attempts = 0;
  while (attempts < 100) {
    const x = Math.floor(Math.random() * W);
    const y = Math.floor(Math.random() * H);
    const k = key(x, y);
    if (
      !state.fires.has(k) &&
      !(x === state.heli.x && y === state.heli.y) &&
      !(x === WATER_ZONE.x && y === WATER_ZONE.y)
    ) {
      state.fires.add(k);
      render();
      return;
    }
    attempts++;
  }
}

function spreadFire() {
  if (state.gameOver || !state.started) return;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  const newFires = [];
  for (const k of state.fires) {
    const [fx, fy] = k.split(",").map(Number);
    // Shuffle directions for randomness
    const shuffled = dirs.slice().sort(() => Math.random() - 0.5);
    for (const [ddx, ddy] of shuffled) {
      const nx = fx + ddx;
      const ny = fy + ddy;
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      const nk = key(nx, ny);
      if (
        !state.fires.has(nk) &&
        !newFires.includes(nk) &&
        !(nx === state.heli.x && ny === state.heli.y) &&
        !(nx === WATER_ZONE.x && ny === WATER_ZONE.y)
      ) {
        newFires.push(nk);
        break; // each fire spreads to one cell
      }
    }
  }
  for (const nk of newFires) {
    state.fires.add(nk);
  }
  if (state.fires.size >= FIRE_LIMIT) {
    endGame("Fire out of control!");
    return;
  }
  render();
}

function moveHeli(dx, dy) {
  if (state.gameOver) return;
  const h = state.heli;
  const nx = h.x + dx;
  const ny = h.y + dy;

  // Walls block movement
  if (nx < 0 || nx >= W || ny < 0 || ny >= H) return;

  h.x = nx;
  h.y = ny;

  // Water pickup
  if (h.x === WATER_ZONE.x && h.y === WATER_ZONE.y && !state.hasWater) {
    state.hasWater = true;
  }

  // Fire extinguish
  if (state.fires.has(key(h.x, h.y)) && state.hasWater) {
    const steamX = h.x;
    const steamY = h.y;
    // Clear all fires
    state.fires.clear();
    state.hasWater = false;
    state.score++;
    state.steam = { x: steamX, y: steamY };
    render();
    // Pause fire spread during steam
    clearInterval(spreadInterval);
    steamTimeout = setTimeout(function () {
      state.steam = null;
      if (!state.gameOver) {
        spawnFire();
        spreadInterval = setInterval(spreadFire, SPREAD_MS);
      }
      render();
    }, 1000);
    return;
  }

  render();
}

function endGame(reason) {
  state.gameOver = true;
  clearInterval(spreadInterval);
  clearTimeout(steamTimeout);
  render();
  showMsg(reason + " Score: " + state.score + " \u2014 Space to restart");
}

function startGame(dx, dy) {
  state.started = true;
  showMsg("");
  spawnFire();
  spreadInterval = setInterval(spreadFire, SPREAD_MS);
  moveHeli(dx, dy);
}

document.addEventListener("keydown", function (e) {
  if (state.gameOver) {
    if (e.code === "Space") {
      e.preventDefault();
      init();
    }
    return;
  }

  let dx = 0, dy = 0;
  switch (e.code) {
    case "ArrowUp":    dy = -1; break;
    case "ArrowDown":  dy = 1;  break;
    case "ArrowLeft":  dx = -1; break;
    case "ArrowRight": dx = 1;  break;
    default: return;
  }
  e.preventDefault();

  if (!state.started) {
    startGame(dx, dy);
  } else {
    moveHeli(dx, dy);
  }
});

init();
</script>
</body>
</html>
