<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helicopter Firefighter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #eee;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
  }
  #hud {
    font-size: 20px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  #board {
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: 0px;
  }
  #message {
    font-size: 18px;
    margin-top: 12px;
    height: 24px;
    color: #ffa;
  }
</style>
</head>
<body>
<div id="hud"></div>
<pre id="board"></pre>
<div id="message"></div>
<script>
const W = 20, H = 11;
const GROUND_ROW = 10;
const LAKE_COL = 0;
const MAX_WATER = 5;
const FIRE_LIMIT = 10;
const BASE_SPREAD_MS = 3000;
const SPAWN_MS = 5000;
const TICK_MS = 100;

let state;
let tickInterval = null;
let spreadInterval = null;
let spawnInterval = null;

function init() {
  clearInterval(tickInterval);
  clearInterval(spreadInterval);
  clearInterval(spawnInterval);
  state = {
    heli: { x: 10 },
    water: MAX_WATER,
    fires: new Set(),
    drops: [],
    steams: [],
    score: 0,
    started: false,
    gameOver: false
  };
  render();
  showMsg("\u2190 \u2192 to move | Space to drop water");
}

function render() {
  const { heli, water, fires, drops, steams, score } = state;

  // HUD
  let waterDisplay = "";
  for (let i = 0; i < MAX_WATER; i++) {
    waterDisplay += i < water ? "\uD83D\uDCA7" : "\u274C";
  }
  document.getElementById("hud").textContent =
    "Score: " + score + " | Water: " + waterDisplay + " | Fires: \uD83D\uDD25 " + fires.size + "/" + FIRE_LIMIT;

  // Build drop lookup for quick access
  const dropAt = {};
  for (const d of drops) {
    dropAt[d.x + "," + d.y] = true;
  }

  // Build steam lookup
  const steamAt = new Set();
  for (const s of steams) {
    steamAt.add(s.x);
  }

  let rows = [];
  for (let y = 0; y < H; y++) {
    let row = "";
    for (let x = 0; x < W; x++) {
      if (y === 0) {
        // Helicopter row
        if (x === LAKE_COL) {
          row += "\uD83C\uDF0A"; // 🌊
        } else if (x === heli.x) {
          row += "\uD83D\uDE81"; // 🚁
        } else if (dropAt[x + "," + y]) {
          row += "\uD83D\uDCA7"; // 💧
        } else {
          row += "\u2B1B"; // ⬛
        }
      } else if (y === GROUND_ROW) {
        // Ground row
        if (x === LAKE_COL) {
          row += "\uD83C\uDF0A"; // 🌊
        } else if (steamAt.has(x)) {
          row += "\uD83D\uDCA8"; // 💨
        } else if (fires.has(x)) {
          row += "\uD83D\uDD25"; // 🔥
        } else {
          row += "\uD83C\uDF33"; // 🌳
        }
      } else {
        // Sky rows
        if (x === LAKE_COL && y >= 0) {
          // Lake column extends down visually only on row 0 and ground
          if (dropAt[x + "," + y]) {
            row += "\uD83D\uDCA7";
          } else {
            row += "\u2B1B";
          }
        } else if (dropAt[x + "," + y]) {
          row += "\uD83D\uDCA7"; // 💧
        } else {
          row += "\u2B1B"; // ⬛
        }
      }
    }
    rows.push(row);
  }
  document.getElementById("board").textContent = rows.join("\n");
}

function showMsg(txt) {
  document.getElementById("message").textContent = txt;
}

function spawnFire() {
  if (state.gameOver) return;
  let attempts = 0;
  while (attempts < 100) {
    const col = 1 + Math.floor(Math.random() * (W - 1)); // columns 1–19
    if (!state.fires.has(col)) {
      state.fires.add(col);
      return;
    }
    attempts++;
  }
}

function spreadFire() {
  if (state.gameOver || !state.started) return;
  const newFires = [];
  for (const col of state.fires) {
    // Try to spread left or right (random direction first)
    const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
    for (const d of dirs) {
      const nc = col + d;
      if (nc < 1 || nc >= W) continue; // can't spread to col 0 (lake) or off grid
      if (!state.fires.has(nc) && !newFires.includes(nc)) {
        newFires.push(nc);
        break;
      }
    }
  }
  for (const nc of newFires) {
    state.fires.add(nc);
  }
  if (state.fires.size >= FIRE_LIMIT) {
    endGame("Fire out of control!");
    return;
  }
  render();
}

function getSpreadMs() {
  // Speed up fire spread as score increases
  const ms = BASE_SPREAD_MS - Math.floor(state.score / 5) * 100;
  return Math.max(ms, 1500);
}

function gameTick() {
  if (state.gameOver) return;

  // Move drops down
  const remainingDrops = [];
  for (const d of state.drops) {
    d.y += 1;
    if (d.y >= GROUND_ROW) {
      // Hit the ground
      if (state.fires.has(d.x)) {
        // Extinguish!
        state.fires.delete(d.x);
        state.score++;
        state.steams.push({ x: d.x, timer: 10 }); // 10 ticks = 1 second
      }
      // Drop disappears whether it hit fire or not
    } else {
      remainingDrops.push(d);
    }
  }
  state.drops = remainingDrops;

  // Tick down steams
  state.steams = state.steams.filter(function(s) {
    s.timer--;
    return s.timer > 0;
  });

  render();
}

function moveHeli(dx) {
  if (state.gameOver) return;
  const nx = state.heli.x + dx;
  if (nx < 0 || nx >= W) return;
  state.heli.x = nx;

  // Refill water at lake
  if (state.heli.x === LAKE_COL) {
    state.water = MAX_WATER;
  }

  render();
}

function dropWater() {
  if (state.gameOver || state.water <= 0) return;
  state.water--;
  state.drops.push({ x: state.heli.x, y: 0 });
  render();
}

function endGame(reason) {
  state.gameOver = true;
  clearInterval(tickInterval);
  clearInterval(spreadInterval);
  clearInterval(spawnInterval);
  render();
  showMsg(reason + " Score: " + state.score + " \u2014 Space to restart");
}

function startGame() {
  state.started = true;
  showMsg("");
  spawnFire();
  tickInterval = setInterval(gameTick, TICK_MS);
  spreadInterval = setInterval(spreadFire, getSpreadMs());
  spawnInterval = setInterval(spawnFire, SPAWN_MS);
}

document.addEventListener("keydown", function (e) {
  if (state.gameOver) {
    if (e.code === "Space") {
      e.preventDefault();
      init();
    }
    return;
  }

  if (e.code === "Space") {
    e.preventDefault();
    if (!state.started) {
      startGame();
    }
    dropWater();
    return;
  }

  let dx = 0;
  switch (e.code) {
    case "ArrowLeft":  dx = -1; break;
    case "ArrowRight": dx = 1;  break;
    default: return;
  }
  e.preventDefault();

  if (!state.started) {
    startGame();
  }
  moveHeli(dx);
});

init();
</script>
</body>
</html>
